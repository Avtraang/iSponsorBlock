name: Build iSponsorBlock IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "Direct URL to decrypted YouTube IPA"
        required: true
        type: string
      display_name:
        description: "App Name"
        default: "YouTube"
        required: true
        type: string
      bundle_id:
        description: "BundleID"
        default: "com.google.ios.youtube"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout iSponsorBlock
        uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Install Alderis (colorpicker dependency)
        run: |
          git clone --recursive https://github.com/hbang/Alderis.git
          cd Alderis
          make DEBUG=0 FINALPACKAGE=1 || true
          # copy headers/libs into Theos so the iSB build can link 'colorpicker'
          cp -R *.h "$THEOS/include/" 2>/dev/null || true
          find . -name "*.dylib" -exec cp {} "$THEOS/lib/" \; 2>/dev/null || true

      - name: Build rootless .deb
        run: make package ROOTLESS=1 FINALPACKAGE=1

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Download and validate IPA
        run: |
          wget "${{ github.event.inputs.ipa_url }}" --no-verbose -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: not a valid IPA. Detected: $file_type."
            exit 1
          fi

      - name: Inject iSponsorBlock into IPA
        run: |
          DEB=$(ls -t packages/*.deb | head -n1)
          echo "Injecting: $DEB"
          cyan -i youtube.ipa -o YouTube_iSB.ipa -uwsf "$DEB" -n "${{ github.event.inputs.display_name }}" -b "${{ github.event.inputs.bundle_id }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube_iSB
          path: YouTube_iSB.ipa
